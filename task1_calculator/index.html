<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0b0b0d;
    --card:#16161d;
    --card2:#1d1d26;
    --red:#ff3b3b;
    --red-dark:#d61f1f;
    --text:#ffffff;
    --muted:#8c8ca3;
    --border:rgba(255,255,255,0.08);
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:radial-gradient(circle,
    rgba(255,59,59,.25),
    transparent 70%);
    z-index:-1;
}

.title{
    text-align:center;
    margin-bottom:25px;
}

.title h1{
    color:white;
    font-size:28px;
    font-family:'JetBrains Mono',monospace;
}

.title p{
    color:var(--muted);
    margin-top:5px;
    font-size:13px;
}

.calculator{
    width:350px;
    padding:20px;
    border-radius:25px;
    background:rgba(22,22,29,.9);
    backdrop-filter:blur(20px);
    border:1px solid var(--border);

    box-shadow:
    0 0 0 1px rgba(255,255,255,.03),
    0 20px 60px rgba(0,0,0,.6),
    0 0 50px rgba(255,59,59,.25);
}

.display{
    width:100%;
    height:90px;
    border:none;
    outline:none;
    border-radius:18px;
    background:var(--card2);
    color:white;
    font-size:2rem;
    text-align:right;
    padding:20px;
    font-family:'JetBrains Mono',monospace;
    margin-bottom:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:1.1rem;
    font-weight:600;
    transition:.2s;
    font-family:'JetBrains Mono',monospace;
}

button:hover{
    transform:translateY(-2px);
}

.number{
    background:#22222d;
    color:white;
}

.operator{
    background:rgba(255,59,59,.12);
    color:var(--red);
}

.operator:hover{
    box-shadow:0 0 20px rgba(255,59,59,.25);
}

.clear{
    background:#3a1b1b;
    color:#ff6b6b;
}

.equal{
    background:linear-gradient(
    135deg,
    var(--red),
    var(--red-dark)
    );
    color:white;
    grid-column:span 2;
}

.equal:hover{
    box-shadow:0 0 25px rgba(255,59,59,.45);
}

.footer{
    margin-top:20px;
    color:#777;
    font-size:13px;
}
</style>
</head>

<body>

<div class="title">
    <h1>Calculator</h1>
    <p>HTML • CSS • JavaScript</p>
</div>

<div class="calculator">

    <input type="text" id="display" class="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>

        <button class="equal" onclick="calculate()">=</button>

    </div>

</div>

<div class="footer">
    Developed by DIVYA SAI ISANAKA
</div>

<script>

const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){

    try{

        let result = eval(display.value);

        if(result === Infinity || result === -Infinity){
            display.value = "Error";
            return;
        }

        display.value = result;

    }catch{

        display.value = "Error";

    }

}

document.addEventListener("keydown",(e)=>{

    if("0123456789+-*/.%".includes(e.key)){
        append(e.key);
    }

    else if(e.key==="Enter"){
        calculate();
    }

    else if(e.key==="Backspace"){
        deleteLast();
    }

    else if(e.key==="Escape"){
        clearDisplay();
    }

});
</script>

</body>
</html>
